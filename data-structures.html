        <script>
            document.querySelectorAll(".btn-ds-card").forEach( (button) => {
                button.addEventListener("click", (e) => {
                    const cardId = button.getAttribute("card-id");

                    document.querySelectorAll(".ds-card").forEach( (card) => card.classList.remove("active"));
                    console.log("card-" + cardId);
                    document.querySelector("#card-" + cardId).classList.add("active");
                })
            });
            /* 
                Query selector para adicionar o event listener nos botoes
                    Remover a classe de ativo das tabs
                    Adicionar a classe ao tab que foi selecionado pelo botao
             */
